version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: agroriego_db
    environment:
      POSTGRES_USER: sa
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: agroriego
    ports:
      - "5433:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql